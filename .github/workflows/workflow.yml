name: 'github actions build and deploy gh-pages'
on:
  push:
    branches:
      - master
      - feature/upgrade-vuepress2
  workflow_dispatch:
jobs:
  build-and-deploy:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          persist-credentials: false

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'

      # 安装依赖：临时使用 --legacy-peer-deps 解决 vuepress 与插件版本冲突
      # 长期建议：将 package.json 中 vuepress 升级至 2.0.0-rc.30 以上，并移除该参数
      - name: Install and build
        run: |
          npm install --legacy-peer-deps
          npm run build
          mkdir -p .site
          cp README.md .site/

      - name: "Deploy Github"
        uses: s0/git-publish-subdir-action@master
        env:
          REPO: git@github.com:binghe001/binghe001.github.io.git
          BRANCH: master
          FOLDER: .site
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}

      - name: Sync to Gitcode
        uses: wearerequired/git-mirror-action@master
        env:
          SSH_PRIVATE_KEY: ${{ secrets.DEPLOY_PRIVATE_KEY }}
        with:
          source-repo: git@github.com:binghe001/binghe001.github.io.git
          destination-repo: git@gitcode.net:binghe/binghe.gitcode.host.git